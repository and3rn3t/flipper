name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint, Type-check & Test
    uses: and3rn3t/.github/.github/workflows/reusable-node-verify.yml@main
    with:
      command: npm run lint && npm run type-check && npm run format:check && npm test && npm run build
